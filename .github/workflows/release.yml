name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create zip archive
        run: |
          mkdir -p package_temp
          find . -maxdepth 1 -type f ! -name "README.md" ! -name "README_zh-CN.md" ! -name "LICENSE" ! -name ".*" -exec cp {} package_temp/ \;
          find . -maxdepth 1 -type d ! -name "." ! -name ".git" ! -name ".github" ! -name package_temp ! -name ".*" -exec cp -r {} package_temp/ \;
          cd package_temp && zip -r ../article-bookmarker-${{ steps.get_version.outputs.VERSION }}.zip . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            article-bookmarker-${{ steps.get_version.outputs.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to ClawHub
        if: success()
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "::warning::CLAWHUB_TOKEN secret is not set. Skipping ClawHub publish."
            rm -rf package_temp
            exit 0
          fi

          SLUG="chliny/article-bookmarker"
          VERSION_NUM="${VERSION#v}"

          PAYLOAD=$(cat <<EOF
          {
            "slug": "${SLUG}",
            "version": "${VERSION_NUM}",
            "changelog": "Release ${VERSION}"
          }
          EOF
          )

          echo "Publishing ${SLUG} v${VERSION_NUM} to ClawHub..."

          FILES_ARGS=""
          cd package_temp
          for file in $(find . -type f ! -name ".*"); do
            FILES_ARGS="$FILES_ARGS -F files[]=@$file"
          done

          curl -s -X POST "https://clawhub.ai/api/v1/skills" \
            -H "Authorization: Bearer ${CLAWHUB_TOKEN}" \
            -F "payload=${PAYLOAD};type=application/json" \
            $FILES_ARGS \
            -w "\nHTTP Status: %{http_code}\n"

          echo "ClawHub publish completed."

      - name: Cleanup
        if: always()
        run: rm -rf package_temp
